name: Build Mod

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Debug — print Gradle wrapper info
        run: |
          echo "=== gradle-wrapper.properties ==="
          cat gradle/wrapper/gradle-wrapper.properties
          echo ""
          echo "=== gradlew script version ==="
          head -5 gradlew
          echo ""
          echo "=== gradle-wrapper.jar size ==="
          ls -la gradle/wrapper/gradle-wrapper.jar || echo "JAR MISSING"
          echo ""
          echo "=== local .gradle dir ==="
          ls -la .gradle/ 2>/dev/null || echo "no .gradle dir"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Cache Gradle project cache
        uses: actions/cache@v4
        with:
          path: .gradle
          key: ${{ runner.os }}-project-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('**/*.gradle*', '**/settings.gradle') }}
          restore-keys: |
            ${{ runner.os }}-project-gradle-

      - name: Cache NeoForge/ForgeGradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/forge_gradle
            ~/.gradle/caches/minecraft
          key: ${{ runner.os }}-forge-1.20.1-${{ hashFiles('build.gradle', 'settings.gradle') }}
          restore-keys: |
            ${{ runner.os }}-forge-1.20.1-

      - name: Build mod
        run: ./gradlew build --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx6G -XX:+UseParallelGC"

      - name: Run data generators (optional)
        run: ./gradlew runData --no-daemon || true
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: someonewasalreadyhere-${{ github.sha }}
          path: build/libs/someonewasalreadyhere-*.jar
          if-no-files-found: warn
          retention-days: 30

      - name: Upload to release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/someonewasalreadyhere-*.jar
          generate_release_notes: true
